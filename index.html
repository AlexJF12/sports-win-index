<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team Wins</title>
<style>
  :root {
    color-scheme: light;
    --page:           #f9f9f7;
    --surface:        #fcfcfb;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --hairline:       #e1e0d9;
    --border:         rgba(11, 11, 11, 0.10);
    --win:            #006300;
    --loss:           #d03b3b;
    --spark:          #c3c2b7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --page:           #0d0d0d;
      --surface:        #1a1a19;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --hairline:       #2c2c2a;
      --border:         rgba(255, 255, 255, 0.10);
      --win:            #0ca30c;
      --loss:           #d03b3b;
      --spark:          #52514e;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--page);
    color: var(--text-primary);
    font: 15px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  main { max-width: 880px; margin: 0 auto; padding: 24px 20px 64px; }

  header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  h1 { font-size: 20px; font-weight: 650; margin: 0; }

  .controls { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .scope {
    display: inline-flex; border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; background: var(--surface);
  }
  .scope button {
    background: none; border: none; color: var(--text-secondary);
    font: inherit; font-size: 13px; padding: 5px 12px; cursor: pointer;
  }
  .scope button[aria-pressed="true"] {
    background: var(--text-primary); color: var(--page); font-weight: 600;
  }
  .month-nav { display: flex; align-items: center; gap: 4px; }
  .month-nav button {
    background: var(--surface); color: var(--text-primary);
    border: 1px solid var(--border); border-radius: 8px;
    width: 30px; height: 30px; font-size: 15px; cursor: pointer;
  }
  .month-nav button:disabled { opacity: 0.35; cursor: default; }
  #month-label { min-width: 130px; text-align: center; font-weight: 600; }

  .pickers { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin: 20px 0 28px; }
  .pickers label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .pickers select {
    width: 100%; padding: 7px 8px; font: inherit;
    background: var(--surface); color: var(--text-primary);
    border: 1px solid var(--border); border-radius: 8px;
  }

  .hero { text-align: center; margin: 8px 0 28px; }
  .hero .num { font-size: 56px; font-weight: 650; line-height: 1.1; }
  .hero .caption { color: var(--text-secondary); margin-top: 2px; }

  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 12px; }
  .tile {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px 12px;
  }
  .tile .label { font-size: 13px; color: var(--text-secondary); }
  .tile .league { color: var(--text-muted); }
  .tile .value { font-size: 34px; font-weight: 650; margin: 2px 0 0; }
  .tile .value.pos { color: var(--win); }
  .tile .value.neg { color: var(--loss); }
  .tile .record { font-size: 13px; color: var(--text-muted); }
  .tile svg { display: block; margin-top: 8px; width: 100%; height: 28px; }

  h2 { font-size: 15px; font-weight: 650; margin: 36px 0 10px; }
  .table-wrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
  table { border-collapse: collapse; width: 100%; font-size: 14px; }
  th, td { text-align: left; padding: 8px 14px; white-space: nowrap; }
  th { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--hairline); }
  tr + tr td { border-top: 1px solid var(--hairline); }
  td.num { font-variant-numeric: tabular-nums; }
  .res { font-weight: 650; }
  .res.W { color: var(--win); }
  .res.L { color: var(--loss); }
  .res.T { color: var(--text-secondary); }
  .empty { color: var(--text-muted); padding: 18px 14px; }
  #error { color: var(--loss); margin: 24px 0; display: none; }
</style>
</head>
<body>
<main>
  <header>
    <h1>Team Wins</h1>
    <div class="controls">
      <div class="scope" role="group" aria-label="Time range">
        <button id="scope-month" aria-pressed="true">Month</button>
        <button id="scope-year" aria-pressed="false">Year</button>
      </div>
      <div class="scope" role="group" aria-label="Metric">
        <button id="metric-wins" aria-pressed="true">Wins</button>
        <button id="metric-net" aria-pressed="false">Net W−L</button>
        <button id="metric-weighted" aria-pressed="false"
          title="Each game is worth 365 ÷ season length: MLB ±2.25, NBA/NHL ±4.45, NFL ±21.47">Weighted</button>
      </div>
      <div class="month-nav">
        <button id="prev" aria-label="Previous period">&lsaquo;</button>
        <span id="month-label"></span>
        <button id="next" aria-label="Next period">&rsaquo;</button>
      </div>
    </div>
  </header>

  <p id="error"></p>
  <section class="pickers" id="pickers"></section>

  <div class="hero">
    <div class="num" id="hero-num">–</div>
    <div class="caption" id="hero-caption"></div>
  </div>

  <section class="tiles" id="tiles"></section>

  <h2 id="games-title">Games</h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>Date</th><th>League</th><th>Matchup</th><th>Score</th><th>Result</th><th>Status</th><th>Pts</th><th>Total</th></tr>
      </thead>
      <tbody id="games-body"></tbody>
    </table>
    <div class="empty" id="games-empty" hidden>No games for your teams this month.</div>
  </div>
</main>

<script>
const LEAGUES = ["mlb", "nba", "nhl", "nfl"];
const LEAGUE_LABEL = { mlb: "MLB", nba: "NBA", nhl: "NHL", nfl: "NFL" };
const LEAGUE_EMOJI = { mlb: "⚾", nba: "🏀", nhl: "🏒", nfl: "🏈" };
// a game's share of the year: 365 / regular-season games
const LEAGUE_WEIGHT = { mlb: 365 / 162, nba: 365 / 82, nhl: 365 / 82, nfl: 365 / 17 };
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DATA_START = { y: 2026, m: 1 };

const state = {
  scope: "month",   // "month" | "year"
  metric: "wins",   // "wins" | "net" | "weighted"  (net: ±1 per game, tie 0;
                    //  weighted: ±LEAGUE_WEIGHT per game, tie 0)
  view: (() => { const now = new Date(); return { y: now.getFullYear(), m: now.getMonth() + 1 }; })(),
  teams: null,       // teams.json: league -> {ABBR: display name}
  cities: null,      // cities.json: city -> league -> [abbr, ...]
  city: "",          // selected city, "" = custom per-league picks
  picks: null,       // league -> abbr
  scores: {},        // league -> rows
};

function monthKey(v) { return `${v.y}${String(v.m).padStart(2, "0")}`; }
function monthLabel(v) { return `${MONTHS[v.m - 1]} ${v.y}`; }
function cmpMonth(a, b) { return (a.y - b.y) || (a.m - b.m); }
function currentMonth() { const now = new Date(); return { y: now.getFullYear(), m: now.getMonth() + 1 }; }

function parseCsv(text) {
  const lines = text.trim().split(/\r?\n/);  // python csv writes CRLF
  if (lines.length < 2) return [];
  const cols = lines[0].split(",");
  return lines.slice(1).map(line => {
    const cells = line.split(",");
    return Object.fromEntries(cols.map((c, i) => [c, cells[i] ?? ""]));
  });
}

async function fetchJson(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`${path}: HTTP ${r.status}`);
  return r.json();
}

async function fetchScores(league) {
  const r = await fetch(`data/${league}_scores.csv`);
  if (!r.ok) return [];  // league file may not exist yet (off-season)
  return parseCsv(await r.text());
}

function loadPicks(defaults) {
  try {
    const saved = JSON.parse(localStorage.getItem("picks"));
    if (saved && LEAGUES.every(l => l in saved)) return saved;
  } catch (e) { /* fall through to defaults */ }
  return defaults;
}

function loadCity() {
  const saved = localStorage.getItem("city");
  return saved && saved in state.cities ? saved : "";
}

// teams currently on the dashboard: every team in the selected city,
// or the per-league picks when no city is selected
function currentSelection() {
  if (state.city) {
    const byLeague = state.cities[state.city] || {};
    return LEAGUES.flatMap(l => (byLeague[l] || []).map(abbr => ({ league: l, abbr })));
  }
  return LEAGUES.filter(l => state.picks[l]).map(l => ({ league: l, abbr: state.picks[l] }));
}

function teamStats(league, abbr, month) {
  const rows = (state.scores[league] || []).filter(r =>
    r.date.startsWith(month) && (r.away_team === abbr || r.home_team === abbr));
  rows.sort((a, b) => a.date.localeCompare(b.date));
  let w = 0, l = 0, t = 0;
  const games = rows.map(r => {
    const res = r.winner === abbr ? "W" : r.winner === "" ? "T" : "L";
    if (res === "W") w++; else if (res === "T") t++; else l++;
    return { ...r, res, team: abbr, league };
  });
  return { games, w, l, t };
}

function sparkline(games, start, end, metric) {
  // cumulative wins (or net W-L) per day from start to end (Dates, inclusive)
  const deltaOn = {};
  for (const g of games) {
    const unit = metric === "weighted" ? LEAGUE_WEIGHT[g.league] : 1;
    const d = g.res === "W" ? unit : g.res === "L" && metric !== "wins" ? -unit : 0;
    if (d) deltaOn[g.date] = (deltaOn[g.date] || 0) + d;
  }
  let cum = 0, byDay = [];
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    const key = `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, "0")}${String(d.getDate()).padStart(2, "0")}`;
    cum += deltaOn[key] || 0;
    byDay.push(cum);
  }
  const min = Math.min(0, ...byDay), max = Math.max(0, ...byDay);
  if (byDay.length < 2 || min === max) return "";
  const W = 100, H = 28, pad = 2;
  const y = v => H - pad - ((v - min) / (max - min)) * (H - 2 * pad);
  const pts = byDay.map((v, i) => {
    const x = pad + (i / (byDay.length - 1)) * (W - 2 * pad);
    return `${x.toFixed(1)},${y(v).toFixed(1)}`;
  });
  const zero = min < 0
    ? `<line x1="0" y1="${y(0).toFixed(1)}" x2="${W}" y2="${y(0).toFixed(1)}" stroke="var(--hairline)" stroke-width="1"/>`
    : "";
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-hidden="true">${zero}
    <polyline points="${pts.join(" ")}" fill="none" stroke="var(--spark)" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function fmtSigned(n, decimals = 0) {
  if (Math.abs(n) < 1e-9) n = 0;  // avoid float residue rendering as -0.0
  const s = n.toFixed(decimals);
  return n > 0 ? `+${s}` : s;
}

function fmtDate(d) { return `${MONTHS[+d.slice(4, 6) - 1].slice(0, 3)} ${+d.slice(6, 8)}`; }

function render() {
  const yearMode = state.scope === "year";
  const prefix = yearMode ? String(state.view.y) : monthKey(state.view);
  const periodName = yearMode ? String(state.view.y) : monthLabel(state.view);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  // sparkline span: the viewed period, capped at today
  let start, end;
  if (yearMode) {
    start = new Date(state.view.y, 0, 1);
    end = state.view.y === now.getFullYear() ? today : new Date(state.view.y, 11, 31);
  } else {
    start = new Date(state.view.y, state.view.m - 1, 1);
    end = cmpMonth(state.view, currentMonth()) === 0 ? today : new Date(state.view.y, state.view.m, 0);
  }
  document.getElementById("month-label").textContent = periodName;
  document.getElementById("prev").disabled = yearMode
    ? state.view.y <= DATA_START.y
    : cmpMonth(state.view, DATA_START) <= 0;
  document.getElementById("next").disabled = yearMode
    ? state.view.y >= now.getFullYear()
    : cmpMonth(state.view, currentMonth()) >= 0;

  let total = 0;
  const tiles = [];
  let allGames = [];
  const metric = state.metric;
  const decimals = metric === "weighted" ? 1 : 0;
  for (const { league, abbr } of currentSelection()) {
    const name = state.teams[league][abbr] || abbr;
    const { games, w, l, t } = teamStats(league, abbr, prefix);
    const metricValue =
      metric === "wins" ? w :
      metric === "net" ? w - l :
      (w - l) * LEAGUE_WEIGHT[league];
    total += metricValue;
    allGames = allGames.concat(games);
    const periodShort = yearMode ? periodName : MONTHS[state.view.m - 1];
    const record = games.length
      ? `${w}–${l}${t ? "–" + t : ""} in ${periodShort}`
      : `No games this ${yearMode ? "year" : "month"}`;
    const signed = metric !== "wins";
    const valueClass = signed && games.length ? (metricValue > 0 ? " pos" : metricValue < 0 ? " neg" : "") : "";
    tiles.push(`<div class="tile">
      <div class="label">${name} <span class="league">· ${LEAGUE_EMOJI[league]} ${LEAGUE_LABEL[league]}</span></div>
      <div class="value${valueClass}">${games.length ? (signed ? fmtSigned(metricValue, decimals) : metricValue) : "–"}</div>
      <div class="record">${record}</div>
      ${sparkline(games, start, end, metric)}
    </div>`);
  }
  document.getElementById("tiles").innerHTML = tiles.join("");
  const subject = state.city ? `${state.city} teams` : "your teams";
  document.getElementById("hero-num").textContent =
    metric === "wins" ? total : fmtSigned(total, decimals);
  document.getElementById("hero-caption").textContent =
    metric === "wins" ? `win${total === 1 ? "" : "s"} for ${subject} in ${periodName}` :
    metric === "net" ? `net wins (W − L) for ${subject} in ${periodName}` :
    `weighted points for ${subject} in ${periodName} (each game = 365 ÷ season length)`;

  // running total in the selected metric, accumulated in game order
  allGames.sort((a, b) => a.date.localeCompare(b.date) || a.league.localeCompare(b.league));
  let running = 0;
  for (const g of allGames) {
    const unit = metric === "weighted" ? LEAGUE_WEIGHT[g.league] : 1;
    g.pts = g.res === "W" ? unit : g.res === "L" && metric !== "wins" ? -unit : 0;
    running += g.pts;
    g.cum = running;
  }
  allGames.reverse();  // display newest first
  const body = document.getElementById("games-body");
  body.innerHTML = allGames.map(g => {
    const opp = g.away_team === g.team ? `at ${g.home_team}` : `vs ${g.away_team}`;
    const score = g.res === "W" || (g.res === "T")
      ? `${Math.max(+g.away_score, +g.home_score)}–${Math.min(+g.away_score, +g.home_score)}`
      : `${Math.min(+g.away_score, +g.home_score)}–${Math.max(+g.away_score, +g.home_score)}`;
    return `<tr>
      <td>${fmtDate(g.date)}</td>
      <td>${LEAGUE_EMOJI[g.league]} ${LEAGUE_LABEL[g.league]}</td>
      <td>${g.team} ${opp}</td>
      <td class="num">${score}</td>
      <td><span class="res ${g.res}">${g.res}</span></td>
      <td>${g.status}</td>
      <td class="num">${g.pts ? fmtSigned(g.pts, decimals) : "0"}</td>
      <td class="num">${metric === "wins" ? g.cum : fmtSigned(g.cum, decimals)}</td>
    </tr>`;
  }).join("");
  document.getElementById("games-empty").textContent =
    `No games for ${subject} this ${yearMode ? "year" : "month"}.`;
  document.getElementById("games-empty").hidden = allGames.length > 0;
}

function renderPickers() {
  const el = document.getElementById("pickers");
  const cityOptions = [["", "Custom teams"], ...Object.keys(state.cities)
    .sort((a, b) => a.localeCompare(b))
    .map(c => [c, c])]
    .map(([value, label]) =>
      `<option value="${value}"${value === state.city ? " selected" : ""}>${label}</option>`)
    .join("");
  const cityPicker = `<div><label for="pick-city">City</label>
    <select id="pick-city">${cityOptions}</select></div>`;
  // a city fully determines the teams (possibly several per league),
  // so the per-league pickers only appear in custom mode
  const leaguePickers = state.city ? "" : LEAGUES.map(league => {
    const options = [["", "None"], ...Object.entries(state.teams[league])
      .sort((a, b) => a[1].localeCompare(b[1]))]
      .map(([abbr, name]) =>
        `<option value="${abbr}"${abbr === state.picks[league] ? " selected" : ""}>${name}</option>`)
      .join("");
    return `<div><label for="pick-${league}">${LEAGUE_LABEL[league]}</label>
      <select id="pick-${league}" data-league="${league}">${options}</select></div>`;
  }).join("");
  el.innerHTML = cityPicker + leaguePickers;
  document.getElementById("pick-city").addEventListener("change", e => {
    state.city = e.target.value;
    localStorage.setItem("city", state.city);
    renderPickers();
    render();
  });
  el.querySelectorAll("select[data-league]").forEach(s => s.addEventListener("change", () => {
    state.picks[s.dataset.league] = s.value;
    localStorage.setItem("picks", JSON.stringify(state.picks));
    render();
  }));
}

function shiftPeriod(delta) {
  let { y, m } = state.view;
  if (state.scope === "year") {
    y += delta;
  } else {
    m += delta;
    if (m === 0) { m = 12; y--; }
    if (m === 13) { m = 1; y++; }
  }
  state.view = { y, m };
  render();
}

function setScope(scope) {
  state.scope = scope;
  document.getElementById("scope-month").setAttribute("aria-pressed", String(scope === "month"));
  document.getElementById("scope-year").setAttribute("aria-pressed", String(scope === "year"));
  render();
}

function setMetric(metric) {
  state.metric = metric;
  for (const m of ["wins", "net", "weighted"]) {
    document.getElementById(`metric-${m}`).setAttribute("aria-pressed", String(metric === m));
  }
  render();
}

async function init() {
  document.getElementById("prev").addEventListener("click", () => shiftPeriod(-1));
  document.getElementById("next").addEventListener("click", () => shiftPeriod(1));
  document.getElementById("scope-month").addEventListener("click", () => setScope("month"));
  document.getElementById("scope-year").addEventListener("click", () => setScope("year"));
  for (const m of ["wins", "net", "weighted"]) {
    document.getElementById(`metric-${m}`).addEventListener("click", () => setMetric(m));
  }
  try {
    const [teams, cities, myTeams, ...scores] = await Promise.all([
      fetchJson("teams.json"),
      fetchJson("cities.json"),
      fetchJson("my_teams.json"),
      ...LEAGUES.map(fetchScores),
    ]);
    state.teams = teams;
    state.cities = cities;
    LEAGUES.forEach((l, i) => { state.scores[l] = scores[i]; });
    const defaults = Object.fromEntries(myTeams.teams.map(t => [t.league, t.abbreviation]));
    state.picks = loadPicks(defaults);
    state.city = loadCity();
    renderPickers();
    render();
  } catch (err) {
    const e = document.getElementById("error");
    e.style.display = "block";
    e.textContent = `Could not load data (${err.message}). Serve this page over HTTP from the repo root, e.g.: python3 -m http.server`;
  }
}
init();
</script>
</body>
</html>
