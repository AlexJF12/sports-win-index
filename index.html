<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team Wins — City Index</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>">
<style>
  :root {
    color-scheme: light;
    --page:           #f9f9f7;
    --surface:        #fcfcfb;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --hairline:       #e1e0d9;
    --border:         rgba(11, 11, 11, 0.10);
    --win:            #006300;
    --loss:           #d03b3b;
    --baseline:       #c3c2b7;
    --deemph:         #c3c2b7;
    --series-1:       #2a78d6;
    --series-2:       #008300;
    --series-3:       #e87ba4;
    --series-4:       #eda100;
    --series-5:       #1baf7a;
    --series-6:       #eb6834;
    --highlight:      #7d3ff0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --page:           #0d0d0d;
      --surface:        #1a1a19;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --hairline:       #2c2c2a;
      --border:         rgba(255, 255, 255, 0.10);
      --win:            #0ca30c;
      --loss:           #d03b3b;
      --baseline:       #383835;
      --deemph:         #52514e;
      --series-1:       #3987e5;
      --series-2:       #008300;
      --series-3:       #d55181;
      --series-4:       #c98500;
      --series-5:       #199e70;
      --series-6:       #d95926;
      --highlight:      #9d6bff;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--page);
    color: var(--text-primary);
    font: 15px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  main { max-width: 880px; margin: 0 auto; padding: 24px 20px 64px; }

  header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  h1 { font-size: 20px; font-weight: 650; margin: 0; }
  nav a { color: var(--text-secondary); font-size: 13px; text-decoration: none; }
  nav a:hover { text-decoration: underline; }
  nav [aria-current="page"] { color: var(--text-primary); font-size: 13px; font-weight: 650; }
  .metric-note { color: var(--text-muted); font-size: 12px; margin: -18px 0 24px; }
  a.glink { color: inherit; text-decoration: none; border-bottom: 1px dotted var(--text-muted); }
  a.glink:hover { border-bottom-style: solid; }

  .controls { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-top: 14px; }
  .scope {
    display: inline-flex; border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; background: var(--surface);
  }
  .scope button {
    background: none; border: none; color: var(--text-secondary);
    font: inherit; font-size: 13px; padding: 5px 12px; cursor: pointer;
  }
  .scope button[aria-pressed="true"] {
    background: var(--text-primary); color: var(--page); font-weight: 600;
  }

  .as-of { color: var(--text-muted); font-size: 13px; margin: 6px 0 24px; }

  section.period { margin-bottom: 36px; }
  h2 { font-size: 15px; font-weight: 650; margin: 0 0 2px; }
  .range { color: var(--text-muted); font-size: 13px; margin-bottom: 10px; }

  .champ {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 10px;
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
  }
  .champ .city { font-size: 24px; font-weight: 650; }
  .champ .score { font-size: 24px; font-weight: 650; margin-left: auto; }
  .champ .score.pos { color: var(--win); }
  .champ .score.neg { color: var(--loss); }
  .champ .detail-record { color: var(--text-muted); font-size: 15px; }
  .champ .detail { color: var(--text-muted); font-size: 13px; flex-basis: 100%; }

  .race {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 16px 8px; margin-bottom: 10px; position: relative;
  }
  .race .legend { display: flex; gap: 18px; flex-wrap: wrap; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
  .race .legend .key { display: inline-flex; align-items: center; gap: 6px; }
  .race .legend .swatch { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
  .race svg { display: block; width: 100%; height: auto; }
  .race .tooltip {
    position: absolute; pointer-events: none; display: none;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 10px; font-size: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); z-index: 2;
    white-space: nowrap;
  }
  .race .tooltip .tt-date { color: var(--text-muted); margin-bottom: 2px; }
  .race .tooltip .tt-row { display: flex; align-items: center; gap: 6px; }
  .table-wrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
  table { border-collapse: collapse; width: 100%; font-size: 14px; }
  th, td { text-align: left; padding: 7px 14px; white-space: nowrap; }
  th { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--hairline); }
  tr + tr td { border-top: 1px solid var(--hairline); }
  td.num { font-variant-numeric: tabular-nums; }
  td.teams { color: var(--text-muted); font-size: 13px; white-space: normal; }
  .empty { color: var(--text-muted); padding: 18px 14px; }
  .show-more { text-align: center; padding: 9px; border-top: 1px solid var(--hairline); }
  .show-more button {
    background: none; border: none; color: var(--text-secondary); font-size: 13px;
    cursor: pointer; text-decoration: underline;
  }
  #error { color: var(--loss); margin: 24px 0; display: none; }

  .share-btn {
    background: var(--surface); color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: 8px;
    font: inherit; font-size: 13px; padding: 5px 12px; cursor: pointer;
  }
  .share-btn:hover { color: var(--text-primary); }

  .hl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 13px; color: var(--text-secondary); }
  .hl-row select {
    padding: 5px 8px; font: inherit; font-size: 13px;
    background: var(--surface); color: var(--text-primary);
    border: 1px solid var(--border); border-radius: 8px;
  }
  tr.hl td { background: color-mix(in srgb, var(--highlight) 10%, transparent); }

  .fandom-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
  .fandom-head {
    display: flex; align-items: baseline; gap: 10px;
    padding: 12px 14px 8px; font-weight: 650;
  }
  .fandom-head .total { margin-left: auto; font-variant-numeric: tabular-nums; }
  .fandom-head .total.pos { color: var(--win); }
  .fandom-head .total.neg { color: var(--loss); }
  .fandom-foot { padding: 9px 14px; border-top: 1px solid var(--hairline); font-size: 13px; }
  .fandom-foot a { color: var(--text-secondary); }

  @media (max-width: 560px) {
    main { padding: 18px 12px 48px; }
    th, td { padding: 7px 10px; }
    .champ .city, .champ .score { font-size: 20px; }
  }
</style>
</head>
<body>
<main>
  <header>
    <h1>City Index</h1>
    <nav style="display:flex;gap:16px;align-items:center">
      <span aria-current="page">city index</span>
      <a href="my-teams.html">my teams</a>
      <a href="groups.html">city groups</a>
      <a href="about.html">about</a>
      <button id="share" class="share-btn" title="Share this view">Share</button>
    </nav>
  </header>
  <div class="controls">
    <div class="scope" role="group" aria-label="Metric">
      <button id="metric-wins" aria-pressed="false">Wins</button>
      <button id="metric-net" aria-pressed="false">Net W−L</button>
      <button id="metric-weighted" aria-pressed="true"
        title="Each game is worth 365 ÷ season length: MLB ±2.25, NBA/NHL ±4.45, NFL ±21.47">Weighted</button>
    </div>
  </div>
  <p class="as-of" id="as-of"></p>
  <p class="metric-note" id="metric-note" hidden>weighted: each game = 365 ÷ season length — MLB ±2.25 · NBA/NHL ±4.45 · NFL ±21.47</p>
  <p id="error"></p>
  <div id="sections"></div>
</main>

<script>
const LEAGUES = ["mlb", "nba", "nhl", "nfl"];
const LEAGUE_LABEL = { mlb: "MLB", nba: "NBA", nhl: "NHL", nfl: "NFL" };
const LEAGUE_EMOJI = { mlb: "⚾", nba: "🏀", nhl: "🏒", nfl: "🏈" };
// a game's share of the year: 365 / regular-season games
const LEAGUE_WEIGHT = { mlb: 365 / 162, nba: 365 / 82, nhl: 365 / 82, nfl: 365 / 17 };
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const PERIODS = [
  { key: "day", title: "Best day" },
  { key: "week", title: "Best week", note: "Tuesday–Monday" },
  { key: "month", title: "Best month" },
  { key: "year", title: "Best year" },
];

let data = null;
let teams = null;      // teams.json: league -> {ABBR: display name}
const scores = {};     // league -> raw score rows (for the best-fandom section)
let metric = "weighted";
let highlightCity = "";  // best-year comparison pick
const expanded = new Set();  // periods currently showing all cities

function parseCsv(text) {
  const lines = text.trim().split(/\r?\n/);  // python csv writes CRLF
  if (lines.length < 2) return [];
  const cols = lines[0].split(",");
  return lines.slice(1).map(line => {
    const cells = line.split(",");
    return Object.fromEntries(cols.map((c, i) => [c, cells[i] ?? ""]));
  });
}

async function fetchJson(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`${path}: HTTP ${r.status}`);
  return r.json();
}

async function fetchScores(league) {
  const r = await fetch(`data/${league}_scores.csv`);
  if (!r.ok) return [];  // league file may not exist yet (off-season)
  return parseCsv(await r.text());
}

function fmtDate(d) { return `${MONTHS[+d.slice(4, 6) - 1].slice(0, 3)} ${+d.slice(6, 8)}`; }

function fmtSigned(n, decimals) {
  if (Math.abs(n) < 1e-9) n = 0;
  const s = n.toFixed(decimals);
  return n > 0 ? `+${s}` : s;
}

function score(g, period) {
  const t = g[period];
  return metric === "wins" ? t.w : metric === "net" ? t.w - t.l : t.weighted;
}

function fmtScore(v) {
  return metric === "wins" ? String(v) : fmtSigned(v, metric === "weighted" ? 2 : 0);
}

function rangeLabel(period) {
  const p = data.periods[period];
  if (period === "day") return fmtDate(p.start);
  if (period === "week") return `${fmtDate(p.start)} – ${fmtDate(p.end)}`;
  if (period === "month") return `${MONTHS[+p.start.slice(4, 6) - 1]} ${p.start.slice(0, 4)}`;
  return p.start.slice(0, 4);
}

function roster(g) {
  return g.teams.map(t => `${LEAGUE_EMOJI[t.league]} ${t.nickname}`).join("  ·  ");
}

// --- race chart -------------------------------------------------------------

const SLOT_COLORS = ["var(--series-1)", "var(--series-2)", "var(--series-3)",
                     "var(--series-4)", "var(--series-5)", "var(--series-6)"];
let cityColors = {};  // city -> color; stable across every chart on the page
const charts = {};    // period -> {days, series, dims} for hover lookup

// phones get a narrower drawing so tick/label text stays legible when the SVG
// scales down; end-of-line name labels are dropped there (the legend covers them)
function isNarrow() { return window.innerWidth <= 560; }
function chartDims() {
  return isNarrow()
    ? { VB_W: 360, VB_H: 240, PLOT: { l: 34, r: 348, t: 12, b: 210 }, endLabels: false }
    : { VB_W: 640, VB_H: 230, PLOT: { l: 38, r: 528, t: 12, b: 200 }, endLabels: true };
}

function* dayRange(startKey, endKey) {
  const d = new Date(+startKey.slice(0, 4), +startKey.slice(4, 6) - 1, +startKey.slice(6, 8));
  const end = new Date(+endKey.slice(0, 4), +endKey.slice(4, 6) - 1, +endKey.slice(6, 8));
  while (d <= end) {
    yield `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, "0")}${String(d.getDate()).padStart(2, "0")}`;
    d.setDate(d.getDate() + 1);
  }
}

function dayMetric(entry) {
  // entry: [w, l, t, weighted]
  if (!entry) return 0;
  return metric === "wins" ? entry[0] : metric === "net" ? entry[0] - entry[1] : entry[3];
}

function niceTicks(min, max) {
  const span = max - min;
  const raw = span / 4;
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  const step = [1, 2, 5, 10].map(m => m * mag).find(s => span / s <= 5) || 10 * mag;
  const ticks = [];
  for (let v = Math.ceil(min / step) * step; v <= max + 1e-9; v += step) ticks.push(v);
  return ticks;
}

function raceChart(period, ranked) {
  const { VB_W, VB_H, PLOT, endLabels } = chartDims();
  const p = data.periods[period];
  const end = data.reference_date < p.end ? data.reference_date : p.end;
  const days = [...dayRange(p.start, end)];
  if (days.length < 2 || !ranked.length) return "";
  const top = ranked.slice(0, 3);
  const cumulative = g => {
    let cum = 0;
    return days.map(d => (cum += dayMetric(g.daily[d])));
  };
  const series = top.map(g => ({
    name: g.name, color: cityColors[g.city] || SLOT_COLORS[0], values: cumulative(g),
  }));
  // best-year comparison: the picked city joins the chart as a highlighted line
  const hl = period === "year" && highlightCity && !top.some(g => g.city === highlightCity)
    ? ranked.find(g => g.city === highlightCity) : null;
  if (hl) series.push({ name: hl.name, color: "var(--highlight)", values: cumulative(hl), wide: true });
  // context lines: every other city, thin and de-emphasized — shown when the
  // table is expanded, or when a comparison city is picked (best year)
  const others = expanded.has(period) || hl
    ? ranked.filter(g => !top.includes(g) && g !== hl).map(g => cumulative(g)) : [];
  const all = series.flatMap(s => s.values).concat(others.flat());
  const min = Math.min(0, ...all), max = Math.max(0, ...all);
  if (max === min) return "";
  const x = i => PLOT.l + (i / (days.length - 1)) * (PLOT.r - PLOT.l);
  const y = v => PLOT.b - ((v - min) / (max - min)) * (PLOT.b - PLOT.t);
  const dec = metric === "weighted" ? 1 : 0;

  const ticks = niceTicks(min, max);
  const grid = ticks.map(v => `
    <line x1="${PLOT.l}" y1="${y(v)}" x2="${PLOT.r}" y2="${y(v)}"
      stroke="${v === 0 ? "var(--baseline)" : "var(--hairline)"}" stroke-width="1"/>
    <text x="${PLOT.l - 6}" y="${y(v) + 4}" text-anchor="end" font-size="12"
      fill="var(--text-muted)">${metric === "wins" ? v : fmtSigned(v, 0)}</text>`).join("");

  const midIdx = Math.floor((days.length - 1) / 2);
  const xLabels = [[0, "start"], [midIdx, "middle"], [days.length - 1, "end"]]
    .map(([i, anchor]) => `<text x="${x(i)}" y="${VB_H - 8}" font-size="12" fill="var(--text-muted)"
      text-anchor="${anchor}">${fmtDate(days[i])}</text>`).join("");

  const ghostLines = others.map(vals => `<polyline fill="none" stroke="var(--deemph)"
    stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.6"
    points="${vals.map((v, j) => `${x(j).toFixed(1)},${y(v).toFixed(1)}`).join(" ")}"/>`).join("");
  const lines = series.map(s => `<polyline fill="none" stroke="${s.color}"
    stroke-width="${s.wide ? 3 : 2}" stroke-linejoin="round" stroke-linecap="round"
    points="${s.values.map((v, j) => `${x(j).toFixed(1)},${y(v).toFixed(1)}`).join(" ")}"/>`).join("");

  // end dots (surface ring) + direct end labels, nudged apart vertically
  // two-line end labels (name / value) so long city names never clip;
  // nudged apart vertically and clamped inside the drawing area
  let dots;
  if (endLabels) {
    const LABEL_H = 30;
    const ends = series.map(s => ({ color: s.color, v: s.values[s.values.length - 1], name: s.name }))
      .sort((a, b) => y(a.v) - y(b.v));
    ends.forEach(e => { e.ly = y(e.v); });
    for (let k = 1; k < ends.length; k++) {
      ends[k].ly = Math.max(ends[k].ly, ends[k - 1].ly + LABEL_H);
    }
    // if the stack ran past the bottom, shift it up and re-space from the top
    const over = ends.length ? ends[ends.length - 1].ly - (VB_H - 24) : 0;
    if (over > 0) {
      ends.forEach(e => { e.ly -= over; });
      ends[0].ly = Math.max(ends[0].ly, PLOT.t + 6);
      for (let k = 1; k < ends.length; k++) {
        ends[k].ly = Math.max(ends[k].ly, ends[k - 1].ly + LABEL_H);
      }
    }
    dots = ends.map(e => `
      <circle cx="${x(days.length - 1)}" cy="${y(e.v)}" r="4" fill="${e.color}"
        stroke="var(--surface)" stroke-width="2"/>
      <text x="${PLOT.r + 10}" y="${e.ly + 4}" font-size="12" fill="var(--text-secondary)">${e.name}</text>
      <text x="${PLOT.r + 10}" y="${e.ly + 18}" font-size="11" fill="var(--text-muted)">${metric === "wins" ? e.v : fmtSigned(e.v, dec)}</text>`).join("");
  } else {
    dots = series.map(s => `
      <circle cx="${x(days.length - 1)}" cy="${y(s.values[s.values.length - 1])}" r="4" fill="${s.color}"
        stroke="var(--surface)" stroke-width="2"/>`).join("");
  }

  charts[period] = { days, series, VB_W, PLOT };
  let legend = series.map(s => `<span class="key"><span class="swatch"
    style="background:${s.color}"></span>${s.name}</span>`).join("");
  if (others.length) {
    legend += `<span class="key"><span class="swatch" style="background:var(--deemph)"></span>
      ${others.length} other cit${others.length === 1 ? "y" : "ies"}</span>`;
  }

  return `<div class="race" data-period="${period}">
    <div class="legend">${legend}</div>
    <svg viewBox="0 0 ${VB_W} ${VB_H}" aria-label="Cumulative ${metric} race, top 3 cities${others.length ? " plus " + others.length + " others" : ""}">
      ${grid}${xLabels}${ghostLines}${lines}${dots}
      <line class="crosshair" x1="0" y1="${PLOT.t}" x2="0" y2="${PLOT.b}"
        stroke="var(--baseline)" stroke-width="1" visibility="hidden"/>
      <rect x="${PLOT.l}" y="${PLOT.t}" width="${PLOT.r - PLOT.l}" height="${PLOT.b - PLOT.t}"
        fill="transparent"/>
    </svg>
    <div class="tooltip"></div>
  </div>`;
}

function wireRaceHover() {
  document.querySelectorAll(".race").forEach(wrap => {
    const period = wrap.dataset.period;
    const svg = wrap.querySelector("svg");
    const cross = wrap.querySelector(".crosshair");
    const tip = wrap.querySelector(".tooltip");
    const showAt = clientX => {
      const { days, series, VB_W, PLOT } = charts[period];
      const rect = svg.getBoundingClientRect();
      const vx = (clientX - rect.left) * VB_W / rect.width;
      const frac = Math.min(1, Math.max(0, (vx - PLOT.l) / (PLOT.r - PLOT.l)));
      const idx = Math.round(frac * (days.length - 1));
      const cx = PLOT.l + (idx / (days.length - 1)) * (PLOT.r - PLOT.l);
      cross.setAttribute("x1", cx); cross.setAttribute("x2", cx);
      cross.setAttribute("visibility", "visible");
      const dec = metric === "weighted" ? 1 : 0;
      tip.innerHTML = `<div class="tt-date">${fmtDate(days[idx])}</div>` + series.map(s => {
        const v = s.values[idx];
        return `<div class="tt-row"><span class="swatch" style="background:${s.color};width:8px;height:8px;border-radius:2px;display:inline-block"></span>
          ${s.name}: ${metric === "wins" ? v : fmtSigned(v, dec)}</div>`;
      }).join("");
      tip.style.display = "block";
      const px = cx * rect.width / VB_W;
      tip.style.left = `${Math.min(px + 12, rect.width - tip.offsetWidth - 4)}px`;
      tip.style.top = "40px";
    };
    const hide = () => {
      cross.setAttribute("visibility", "hidden");
      tip.style.display = "none";
    };
    svg.addEventListener("mousemove", e => showAt(e.clientX));
    svg.addEventListener("mouseleave", hide);
    svg.addEventListener("touchstart", e => showAt(e.touches[0].clientX), { passive: true });
    svg.addEventListener("touchmove", e => showAt(e.touches[0].clientX), { passive: true });
    svg.addEventListener("touchend", hide);
  });
}

function bestPerCity(period) {
  // rank each city by its best-scoring combination for this period
  const best = new Map();
  for (const g of data.groups) {
    const games = g[period].w + g[period].l + g[period].t;
    if (!games) continue;
    const cur = best.get(g.city);
    if (!cur || score(g, period) > score(cur, period)
        || (score(g, period) === score(cur, period) && g[period].w > cur[period].w)) {
      best.set(g.city, g);
    }
  }
  return [...best.values()].sort((a, b) =>
    score(b, period) - score(a, period) || b[period].w - a[period].w || a.city.localeCompare(b.city));
}

function myTeamsUrl(picks) {
  // picks: array of {league, abbr} — leagues absent from the array are omitted
  const params = new URLSearchParams();
  for (const l of LEAGUES) {
    const t = picks.find(p => p.league === l);
    params.set(l, t ? t.abbr : "");
  }
  return `my-teams.html?${params.toString()}`;
}

function cityLink(g, label) {
  return `<a class="glink" href="${myTeamsUrl(g.teams)}" title="View this group in My Teams">${label ?? g.name}</a>`;
}

function assignCityColors(rankedByPeriod) {
  // one stable color per city across every chart on the page, ordered by
  // year standing so the season leader is always slot 1
  const inCharts = new Set();
  for (const key of ["week", "month", "year"]) {
    for (const g of rankedByPeriod[key].slice(0, 3)) inCharts.add(g.city);
  }
  cityColors = {};
  let slot = 0;
  for (const g of rankedByPeriod.year) {
    if (inCharts.has(g.city) && !(g.city in cityColors)) {
      cityColors[g.city] = SLOT_COLORS[slot % SLOT_COLORS.length];
      slot++;
    }
  }
}

function render() {
  document.getElementById("as-of").innerHTML =
    `As of ${fmtDate(data.reference_date)}, ${data.reference_date.slice(0, 4)} — updated each morning after the previous day's games. ` +
    `Cities with multiple same-league teams compete as <a class="glink" href="groups.html">combinations</a>; each city is shown by its best combination for the period.`;
  document.getElementById("metric-note").hidden = metric !== "weighted";
  const rankedByPeriod = Object.fromEntries(PERIODS.map(({ key }) => [key, bestPerCity(key)]));
  assignCityColors(rankedByPeriod);
  const sections = PERIODS.map(({ key, title, note }) => {
    const ranked = rankedByPeriod[key];
    const range = rangeLabel(key) + (note ? ` (${note})` : "");
    if (!ranked.length) {
      return `<section class="period"><h2>${title}</h2><div class="range">${range}</div>
        <div class="table-wrap"><div class="empty">No games in this period.</div></div></section>`;
    }
    const champ = ranked[0];
    const cv = score(champ, key);
    const champCls = metric === "wins" ? "" : cv > 0 ? " pos" : cv < 0 ? " neg" : "";
    const isExpanded = expanded.has(key);
    const rowHtml = (g, i) => {
      const t = g[key];
      // competition ranking: tied scores share a rank (1, 1, 3, ...)
      let rank = i + 1;
      while (rank > 1 && Math.abs(score(ranked[rank - 2], key) - score(g, key)) < 1e-9) rank--;
      const isHl = key === "year" && highlightCity && g.city === highlightCity;
      return `<tr${isHl ? ' class="hl"' : ""}>
        <td class="num">${cityLink(g, rank)}</td>
        <td>${cityLink(g)}</td>
        <td class="teams">${roster(g)}</td>
        <td class="num">${t.w}–${t.l}${t.t ? "–" + t.t : ""}</td>
        <td class="num">${fmtScore(score(g, key))}</td>
      </tr>`;
    };
    let rows = (isExpanded ? ranked : ranked.slice(0, 3)).map(rowHtml).join("");
    // a compared city outside the top 3 still gets its row, at its true rank
    if (key === "year" && highlightCity && !isExpanded) {
      const idx = ranked.findIndex(g => g.city === highlightCity);
      if (idx >= 3) rows += rowHtml(ranked[idx], idx);
    }
    const hlControl = key === "year" ? `<div class="hl-row">
      <label for="highlight-city">Compare a city:</label>
      <select id="highlight-city"><option value="">None</option>
        ${ranked.map(g => `<option value="${g.city}"${g.city === highlightCity ? " selected" : ""}>${g.city}</option>`).join("")}
      </select></div>` : "";
    return `<section class="period">
      <h2>${title}</h2>
      <div class="range">${range}</div>
      <div class="champ">
        <span class="city">${cityLink(champ)}</span>
        <span class="detail-record">${champ[key].w}–${champ[key].l}${champ[key].t ? "–" + champ[key].t : ""}</span>
        <span class="score${champCls}">${fmtScore(cv)}</span>
        <span class="detail">${roster(champ)}</span>
      </div>
      ${hlControl}
      ${key === "day" ? "" : raceChart(key, ranked)}
      <div class="table-wrap"><table>
        <thead><tr><th>#</th><th>City</th><th>Teams</th><th>Record</th><th>Score</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>${ranked.length > 3 ? `<div class="show-more">
        <button data-period="${key}">${isExpanded ? "Show top 3" : `Show all ${ranked.length} cities`}</button>
      </div>` : ""}</div>
    </section>`;
  });
  document.getElementById("sections").innerHTML = sections.join("") + fandomSection();
  wireRaceHover();
  document.querySelectorAll(".show-more button").forEach(btn => {
    btn.addEventListener("click", () => {
      const p = btn.dataset.period;
      if (expanded.has(p)) expanded.delete(p); else expanded.add(p);
      render();
    });
  });
  const hlSel = document.getElementById("highlight-city");
  if (hlSel) hlSel.addEventListener("change", () => {
    highlightCity = hlSel.value;
    render();
  });
}

// --- best fandom ------------------------------------------------------------
// the top team in each league for a date-prefix window, regardless of city

function bestFandom(prefix) {
  const val = (e, league) => metric === "wins" ? e.w : metric === "net" ? e.w - e.l
    : (e.w - e.l) * LEAGUE_WEIGHT[league];
  const picks = [];
  for (const league of LEAGUES) {
    const rec = {};
    for (const r of scores[league] || []) {
      if (!r.date.startsWith(prefix)) continue;
      for (const abbr of [r.away_team, r.home_team]) {
        const e = rec[abbr] || (rec[abbr] = { w: 0, l: 0, t: 0 });
        if (r.winner === abbr) e.w++; else if (r.winner === "") e.t++; else e.l++;
      }
    }
    const best = Object.entries(rec).sort(([aAbbr, a], [bAbbr, b]) =>
      val(b, league) - val(a, league) || b.w - a.w || aAbbr.localeCompare(bAbbr))[0];
    if (best) picks.push({ league, abbr: best[0], rec: best[1], value: val(best[1], league) });
  }
  return picks;
}

function fandomCard(title, prefix) {
  const picks = bestFandom(prefix);
  if (!picks.length) {
    return `<div class="table-wrap"><div class="fandom-head">${title}</div>
      <div class="empty">No games in this period.</div></div>`;
  }
  const total = picks.reduce((s, p) => s + p.value, 0);
  const cls = metric === "wins" ? "" : total > 0 ? " pos" : total < 0 ? " neg" : "";
  const rows = picks.map(p => `<tr>
    <td>${LEAGUE_EMOJI[p.league]} ${LEAGUE_LABEL[p.league]}</td>
    <td>${(teams[p.league] || {})[p.abbr] || p.abbr}</td>
    <td class="num">${p.rec.w}–${p.rec.l}${p.rec.t ? "–" + p.rec.t : ""}</td>
    <td class="num">${fmtScore(p.value)}</td>
  </tr>`).join("");
  const url = myTeamsUrl(picks.map(p => ({ league: p.league, abbr: p.abbr })));
  return `<div class="table-wrap">
    <div class="fandom-head">${title}<span class="total${cls}">${fmtScore(total)}</span></div>
    <table><thead><tr><th>League</th><th>Team</th><th>Record</th><th>Score</th></tr></thead>
    <tbody>${rows}</tbody></table>
    <div class="fandom-foot"><a class="glink" href="${url}">View this fandom in My Teams →</a></div>
  </div>`;
}

function fandomSection() {
  const ref = data.reference_date;
  const monthTitle = `${MONTHS[+ref.slice(4, 6) - 1]} ${ref.slice(0, 4)}`;
  return `<section class="period">
    <h2>Best fandom</h2>
    <div class="range">The top team in each league, no matter the city — the fandom you wish you had.</div>
    <div class="fandom-grid">
      ${fandomCard(monthTitle, ref.slice(0, 6))}
      ${fandomCard(ref.slice(0, 4), ref.slice(0, 4))}
    </div>
  </section>`;
}

function setMetric(m) {
  metric = m;
  for (const x of ["wins", "net", "weighted"]) {
    document.getElementById(`metric-${x}`).setAttribute("aria-pressed", String(m === x));
  }
  render();
}


async function shareView() {
  const btn = document.getElementById("share");
  if (navigator.share) {
    // mobile: native share sheet with a link to what's on screen
    try { await navigator.share({ title: document.title, url: location.href }); }
    catch (err) { /* user closed the sheet */ }
  } else {
    await navigator.clipboard.writeText(location.href);
    btn.textContent = "Copied!";
    setTimeout(() => { btn.textContent = "Share"; }, 1500);
  }
}

async function init() {
  for (const m of ["wins", "net", "weighted"]) {
    document.getElementById(`metric-${m}`).addEventListener("click", () => setMetric(m));
  }
  document.getElementById("share").addEventListener("click", shareView);
  // charts draw at a narrower aspect on phones; re-render when crossing the breakpoint
  let narrow = isNarrow();
  window.addEventListener("resize", () => {
    if (isNarrow() !== narrow) { narrow = isNarrow(); if (data) render(); }
  });
  try {
    const [rankings, teamsJson, ...csvs] = await Promise.all([
      fetchJson("data/city_rankings.json"),
      fetchJson("teams.json"),
      ...LEAGUES.map(fetchScores),
    ]);
    data = rankings;
    teams = teamsJson;
    LEAGUES.forEach((l, i) => { scores[l] = csvs[i]; });
    render();
  } catch (err) {
    const e = document.getElementById("error");
    e.style.display = "block";
    e.textContent = `Could not load data (${err.message}). Serve this page over HTTP from the repo root, e.g.: python3 -m http.server`;
  }
}
init();
</script>
